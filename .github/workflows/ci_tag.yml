name: Dart CI & Auto Tag

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # Only commit & tag if this is a push to main (i.e., post-merge)
      - name: Set up Git
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: git fetch --tags

      - name: Get latest tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: get_tag
        run: |
          latest_tag=$(git tag --sort=-v:refname | head -n 1)
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Generate new tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: new_tag
        run: |
          latest=${{ steps.get_tag.outputs.latest_tag }}
          if [[ "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major=${BASH_REMATCH[1]}
            minor=${BASH_REMATCH[2]}
            patch=${BASH_REMATCH[3]}
            patch=$((patch + 1))
            new_tag="v$major.$minor.$patch"
          else
            new_tag="v0.1.0"
          fi
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Create and push tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git tag ${{ steps.new_tag.outputs.new_tag }}
          git push origin ${{ steps.new_tag.outputs.new_tag }}

      - name: Log tag info
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Previous tag: ${{ steps.get_tag.outputs.latest_tag }}"
          echo "New tag: ${{ steps.new_tag.outputs.new_tag }}"